<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Registro de cortes · Barbería Elite</title>
</head>
<body>
<div id="app"></div>

<style>
  html, body{ margin:0; padding:0; }
  :root{
    --bg:#1c1b19;
    --surface:#242220;
    --surface-2:#2e2b27;
    --text:#f0ece4;
    --text-dim:#9c9488;
    --accent:#c08b4a;
    --accent-dim:#8a6d3f;
    --line:#3c3833;
    --danger:#b0524a;
    --good:#7c9473;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; }

  #app{
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 60px;
    max-width: 560px;
    margin: 0 auto;
  }

  .eyebrow{
    text-transform: uppercase;
    letter-spacing: .14em;
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 4px;
  }

  h1{
    margin: 0 0 2px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -.01em;
  }

  .subtitle{
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 18px;
  }

  .card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }

  .row{ display:flex; gap:10px; }
  .row > *{ flex:1; }

  label{
    display:block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  input, select{
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 7px;
    font-size: 15px;
    font-family: inherit;
  }
  input:focus, select:focus{
    outline: none;
    border-color: var(--accent);
  }

  input[type=number]{ font-variant-numeric: tabular-nums; }

  .btn{
    width: 100%;
    background: var(--accent);
    color: #1c1b19;
    border: none;
    padding: 13px;
    border-radius: 7px;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: .02em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 12px;
  }
  .btn:hover{ background: #d19c5c; }
  .btn.secondary{
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--line);
    text-transform: none;
    font-weight: 600;
    letter-spacing: 0;
  }
  .btn.secondary:hover{ color: var(--text); border-color: var(--text-dim); }
  .btn.danger-outline{
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
    text-transform: none;
    font-weight: 600;
  }

  .section-title{
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-dim);
    margin: 22px 0 8px;
    display:flex;
    justify-content: space-between;
    align-items: center;
  }

  .ticket{
    border-top: 1px dashed var(--line);
    padding-top: 10px;
    margin-top: 10px;
  }
  .ticket:first-child{ border-top:none; margin-top:0; padding-top:0; }

  .cut-row{
    display:flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  .cut-row:last-child{ border-bottom:none; }
  .cut-meta{ color: var(--text-dim); font-size: 12px; }
  .cut-amt{ font-variant-numeric: tabular-nums; font-weight: 700; }
  .cut-comm{ color: var(--good); font-size: 12px; font-variant-numeric: tabular-nums; }
  .del{
    background:none; border:none; color: var(--text-dim); cursor:pointer;
    font-size: 16px; padding: 4px 8px; margin-left: 4px;
  }
  .del:hover{ color: var(--danger); }

  .empty{
    color: var(--text-dim);
    font-size: 13px;
    text-align:center;
    padding: 18px 0;
  }

  .totals-grid{
    display:flex;
    gap:10px;
  }
  .total-box{
    flex:1;
    background: var(--surface-2);
    border-radius: 8px;
    padding: 12px;
    text-align:center;
  }
  .total-box .num{
    font-size: 20px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .total-box .lbl{
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .day-row{
    display:flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  .day-row:last-child{ border-bottom: none; }
  .day-row .d{ color: var(--text-dim); }
  .day-row .v{ font-variant-numeric: tabular-nums; font-weight: 600; }
  .day-row.today .d{ color: var(--accent); font-weight: 700; }

  .payout-banner{
    background: linear-gradient(135deg, var(--accent-dim), var(--accent));
    border-radius: 10px;
    padding: 18px;
    text-align:center;
    margin-bottom: 14px;
  }
  .payout-banner .lbl{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: #241c10;
    font-weight: 700;
  }
  .payout-banner .num{
    font-size: 32px;
    font-weight: 800;
    color: #1c1b19;
    font-variant-numeric: tabular-nums;
    margin-top: 4px;
  }
  .payout-banner .sub{
    font-size: 12px;
    color: #241c10;
    margin-top: 2px;
  }

  .toast{
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface-2);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s, transform .25s;
    z-index: 50;
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(-6px);
  }

  .print-sheet{ display:none; }
  @media print{
    body *{ visibility:hidden; }
    .print-sheet, .print-sheet *{ visibility:visible; }
    .print-sheet{
      display:block;
      position:absolute;
      top:0; left:0;
      width:100%;
      background:#fff;
      color:#111;
      padding: 24px;
      font-family: -apple-system, Arial, sans-serif;
    }
    .print-sheet h2{ margin:0 0 2px; font-size:20px; }
    .print-sheet .ps-sub{ color:#555; font-size:12px; margin-bottom:16px; }
    .print-sheet table{ width:100%; border-collapse:collapse; font-size:13px; }
    .print-sheet th, .print-sheet td{ text-align:left; padding:6px 4px; border-bottom:1px solid #ddd; }
    .print-sheet tfoot td{ font-weight:700; border-top:2px solid #111; border-bottom:none; }
    .print-sheet .ps-total{ margin-top:18px; font-size:16px; font-weight:800; }
  }
</style>

<script>
// ---------- Remote storage (jsonbin.io) ----------
// BIN_ID queda vacío hasta que Kevin crea el bin una vez (ver setup screen).
// Una vez creado, Claude lo graba acá para que quede fijo en el archivo final.
const JSONBIN_MASTER_KEY = '$2a$10$Dck.rsDiFltrDIPLDsB52.cGIAeErW3resCGyhodR0ZpEYAN5pO7.';
let JSONBIN_BIN_ID = '6a5b0317da38895dfe6dd4a1';

function defaultRemoteData(){
  return { config: { commissionPct: 60, employeeName: '' }, cutsLog: {}, weekHistory: [] };
}

async function createBin(){
  const res = await fetch('https://api.jsonbin.io/v3/b', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': JSONBIN_MASTER_KEY,
      'X-Bin-Name': 'barberia-elite-registro-cortes'
    },
    body: JSON.stringify(defaultRemoteData())
  });
  if(!res.ok) throw new Error('No se pudo crear el almacenamiento');
  const json = await res.json();
  return json.metadata.id;
}

async function fetchRemote(){
  const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
    headers: { 'X-Master-Key': JSONBIN_MASTER_KEY }
  });
  if(!res.ok) throw new Error('No se pudo leer el almacenamiento');
  const json = await res.json();
  return json.record;
}

async function pushRemote(data){
  await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY },
    body: JSON.stringify(data)
  });
}

// In-memory mirror of the remote bin, synced on load/save/poll.
let remoteData = defaultRemoteData();

async function loadConfig(){ return remoteData.config; }
async function saveConfig(cfg){ remoteData.config = cfg; await pushRemote(remoteData); }
async function loadCuts(){ return remoteData.cutsLog; }
async function saveCuts(log){ remoteData.cutsLog = log; await pushRemote(remoteData); }
async function loadHistory(){ return remoteData.weekHistory; }
async function saveHistory(hist){ remoteData.weekHistory = hist; await pushRemote(remoteData); }

// ---------- Date helpers ----------
function todayKey(d = new Date()){
  return d.toISOString().slice(0,10);
}
function mondayOf(d){
  const dt = new Date(d);
  const day = dt.getDay(); // 0=Sun..6=Sat
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0,0,0,0);
  return dt;
}
function weekDates(anchor = new Date()){
  const mon = mondayOf(anchor);
  const arr = [];
  for(let i=0;i<6;i++){ // Lunes a Sábado, el local no abre los domingos
    const d = new Date(mon);
    d.setDate(mon.getDate()+i);
    arr.push(d);
  }
  return arr;
}
const DIAS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
function fmtMoney(n){
  return '$' + Number(n).toLocaleString('es-AR', { maximumFractionDigits: 0 });
}
function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
}

function printWeekSheet(data){
  let sheet = document.querySelector('.print-sheet');
  if(!sheet){
    sheet = document.createElement('div');
    sheet.className = 'print-sheet';
    document.body.appendChild(sheet);
  }
  const rowsHtml = data.days.map(d => `<tr>
    <td>${d.label}</td><td>${d.cuts}</td><td>${fmtMoney(d.revenue)}</td><td>${fmtMoney(d.commission)}</td>
  </tr>`).join('');
  sheet.innerHTML = `
    <h2>Resumen semanal · Barbería Elite</h2>
    <div class="ps-sub">${data.employeeName ? 'Empleado: ' + data.employeeName + ' · ' : ''}Semana ${data.rangeLabel} · Comisión ${data.commissionPct}%</div>
    <table>
      <thead><tr><th>Día</th><th>Cortes</th><th>Facturado</th><th>Comisión</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
      <tfoot><tr><td>Total</td><td>${data.totalCuts}</td><td>${fmtMoney(data.totalRevenue)}</td><td>${fmtMoney(data.totalCommission)}</td></tr></tfoot>
    </table>
    <div class="ps-total">A pagar: ${fmtMoney(data.totalCommission)}</div>
  `;
  setTimeout(()=> window.print(), 50);
}


let config = { commissionPct: 60, employeeName: '' };
let cutsLog = {}; // { 'YYYY-MM-DD': [ {id, price, service, time} ] }
let weekHistory = []; // archive of closed weeks: { rangeLabel, employeeName, commissionPct, days:[...], totalCuts, totalRevenue, totalCommission, closedAt }
let showHistory = false;

const app = document.getElementById('app');

function showToast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  app.appendChild(t);
  requestAnimationFrame(()=> t.classList.add('show'));
  setTimeout(()=>{
    t.classList.remove('show');
    setTimeout(()=> t.remove(), 300);
  }, 1800);
}

function render(){
  const today = new Date();
  const tKey = todayKey(today);
  const week = weekDates(today);
  const todayCuts = cutsLog[tKey] || [];

  const pct = 0.6; // comisión fija 60%, no editable

  let weekTotalRevenue = 0;
  let weekTotalCommission = 0;
  const dayRowsHtml = week.map(d => {
    const k = todayKey(d);
    const cuts = cutsLog[k] || [];
    const rev = cuts.reduce((s,c)=> s + Number(c.price), 0);
    weekTotalRevenue += rev;
    weekTotalCommission += rev * pct;
    const isToday = k === tKey;
    return `<div class="day-row ${isToday ? 'today' : ''}">
      <span class="d">${DIAS[(d.getDay()+6)%7]} ${d.getDate()}/${d.getMonth()+1}${isToday ? ' · hoy' : ''}</span>
      <span class="v">${cuts.length} cortes · ${fmtMoney(rev)}</span>
    </div>`;
  }).join('');

  const todayRevenue = todayCuts.reduce((s,c)=> s + Number(c.price), 0);
  const todayCommission = todayRevenue * pct;

  const todayCutsHtml = todayCuts.length
    ? todayCuts.slice().reverse().map(c => `
      <div class="cut-row">
        <div>
          <div>${c.service}</div>
          <div class="cut-meta">${fmtTime(c.time)}</div>
        </div>
        <div style="text-align:right; display:flex; align-items:center;">
          <div>
            <div class="cut-amt">${fmtMoney(c.price)}</div>
            <div class="cut-comm">+${fmtMoney(c.price * pct)}</div>
          </div>
          <button class="del" data-del="${c.id}" title="Eliminar">✕</button>
        </div>
      </div>
    `).join('')
    : `<div class="empty">Todavía no cargaste cortes hoy.</div>`;

  app.innerHTML = `
    <div class="eyebrow">Barbería Elite</div>
    <h1>Registro de cortes</h1>
    <div class="subtitle">Cargá cada corte y calculá la paga semanal por comisión.</div>

    <div class="card">
      <div class="row">
        <div>
          <label>Empleado</label>
          <input id="empName" type="text" placeholder="Nombre" value="${config.employeeName || ''}" />
        </div>
        <div>
          <label>Comisión</label>
          <input type="text" value="60%" disabled style="opacity:.6;" />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label>Servicio</label>
          <select id="service">
            <option>Corte</option>
            <option>Barba</option>
            <option>Corte + Barba</option>
          </select>
        </div>
        <div>
          <label>Precio</label>
          <input id="price" type="number" min="0" placeholder="0" />
        </div>
      </div>
      <button class="btn" id="addCut">+ Registrar corte</button>
    </div>

    <div class="section-title">
      <span>Hoy</span>
      <span>${todayCuts.length} corte${todayCuts.length===1?'':'s'} · ${fmtMoney(todayCommission)} de comisión</span>
    </div>
    <div class="card">
      ${todayCutsHtml}
    </div>

    <div class="section-title"><span>Semana actual</span></div>
    <div class="card">
      ${dayRowsHtml}
    </div>

    <div class="payout-banner">
      <div class="lbl">A pagar esta semana</div>
      <div class="num">${fmtMoney(weekTotalCommission)}</div>
      <div class="sub">sobre ${fmtMoney(weekTotalRevenue)} facturados · comisión 60%</div>
    </div>

    <button class="btn secondary" id="downloadSummary">⬇ Descargar resumen semanal (PDF)</button>
    <button class="btn secondary" id="closeWeek">Cerrar semana y pagar (borra los cortes de esta semana)</button>

    <div class="section-title">
      <span>Semanas anteriores</span>
      ${!showHistory ? `<button class="btn secondary" id="toggleHistory" style="width:auto; margin:0; padding:5px 10px; font-size:11px;">Ver</button>` : ''}
    </div>
    ${showHistory ? `
    <div class="card">
      ${weekHistory.length
        ? weekHistory.map((w, i) => `
          <div class="day-row">
            <span class="d">${w.rangeLabel}${w.employeeName ? ' · ' + w.employeeName : ''}</span>
            <span class="v" style="display:flex; align-items:center; gap:8px;">
              ${w.totalCuts} cortes · ${fmtMoney(w.totalCommission)}
              <button class="del" data-hist-pdf="${i}" title="Descargar PDF">⬇</button>
            </span>
          </div>
        `).join('')
        : `<div class="empty">Todavía no cerraste ninguna semana.</div>`
      }
      ${weekHistory.length ? `<button class="btn danger-outline" id="clearHistory" style="margin-top:12px;">Borrar historial de semanas anteriores</button>` : ''}
    </div>` : ''}
  `;

  // ---- Event bindings ----
  document.getElementById('empName').addEventListener('change', async (e)=>{
    config.employeeName = e.target.value;
    await saveConfig(config);
  });

  document.getElementById('addCut').addEventListener('click', async ()=>{
    const priceEl = document.getElementById('price');
    const serviceEl = document.getElementById('service');
    const price = Number(priceEl.value);
    if(!price || price <= 0){
      priceEl.focus();
      showToast('Ingresá un precio válido');
      return;
    }
    const entry = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      price,
      service: serviceEl.value,
      time: new Date().toISOString()
    };
    const k = todayKey();
    if(!cutsLog[k]) cutsLog[k] = [];
    cutsLog[k].push(entry);
    await saveCuts(cutsLog);
    render();
    showToast('Corte registrado');
  });
  app.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-del');
      const k = todayKey();
      cutsLog[k] = (cutsLog[k] || []).filter(c => c.id !== id);
      await saveCuts(cutsLog);
      render();
    });
  });
  document.getElementById('downloadSummary').addEventListener('click', async ()=>{
    const first = week[0], last = week[5];
    const rangeLabel = `${first.getDate()}/${first.getMonth()+1} al ${last.getDate()}/${last.getMonth()+1}/${last.getFullYear()}`;
    const days = week.map(d=>{
      const k = todayKey(d);
      const cuts = cutsLog[k] || [];
      const rev = cuts.reduce((s,c)=> s + Number(c.price), 0);
      return { label: `${DIAS[(d.getDay()+6)%7]} ${d.getDate()}/${d.getMonth()+1}`, cuts: cuts.length, revenue: rev, commission: rev * pct };
    });
    printWeekSheet({
      rangeLabel, employeeName: config.employeeName, commissionPct: 60,
      days, totalCuts: days.reduce((s,d)=>s+d.cuts,0), totalRevenue: weekTotalRevenue, totalCommission: weekTotalCommission
    });
  });

  document.getElementById('closeWeek').addEventListener('click', async ()=>{
    if(!confirm('¿Cerrar la semana? Se guarda un resumen permanente en el historial y se borra el detalle diario para arrancar de cero.')){
      return;
    }
    const first = week[0], last = week[5];
    const rangeLabel = `${first.getDate()}/${first.getMonth()+1} al ${last.getDate()}/${last.getMonth()+1}/${last.getFullYear()}`;
    const days = week.map(d=>{
      const k = todayKey(d);
      const cuts = cutsLog[k] || [];
      const rev = cuts.reduce((s,c)=> s + Number(c.price), 0);
      return { label: `${DIAS[(d.getDay()+6)%7]} ${d.getDate()}/${d.getMonth()+1}`, cuts: cuts.length, revenue: rev, commission: rev * pct };
    });
    weekHistory.unshift({
      rangeLabel, employeeName: config.employeeName, commissionPct: 60,
      days, totalCuts: days.reduce((s,d)=>s+d.cuts,0), totalRevenue: weekTotalRevenue, totalCommission: weekTotalCommission,
      closedAt: new Date().toISOString()
    });
    weekHistory = weekHistory.slice(0, 26); // ~6 meses de respaldo
    await saveHistory(weekHistory);
    week.forEach(d => { delete cutsLog[todayKey(d)]; });
    await saveCuts(cutsLog);
    render();
    showToast('Semana cerrada y guardada en el historial');
  });

  const toggleHistBtn = document.getElementById('toggleHistory');
  if(toggleHistBtn){
    toggleHistBtn.addEventListener('click', ()=>{
      showHistory = true;
      render();
    });
  }
  const clearHistBtn = document.getElementById('clearHistory');
  if(clearHistBtn){
    clearHistBtn.addEventListener('click', async ()=>{
      if(!confirm('¿Borrar todo el historial de semanas anteriores? No se puede deshacer.')) return;
      weekHistory = [];
      await saveHistory(weekHistory);
      render();
      showToast('Historial borrado');
    });
  }
  app.querySelectorAll('[data-hist-pdf]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const idx = Number(btn.getAttribute('data-hist-pdf'));
      const w = weekHistory[idx];
      if(w) printWeekSheet(w);
    });
  });
}

// ---------- Live sync across devices ----------
let syncing = false;
async function syncFromRemote(){
  if(!JSONBIN_BIN_ID) return;
  if(syncing) return;
  // don't yank focus away if someone is mid-typing on this device
  const active = document.activeElement;
  const isTyping = active && (active.tagName === 'INPUT' || active.tagName === 'SELECT');
  if(isTyping) return;
  syncing = true;
  try{
    const remote = await fetchRemote();
    const changed = JSON.stringify(remote) !== JSON.stringify(remoteData);
    if(changed){
      remoteData = remote;
      config = remoteData.config;
      cutsLog = remoteData.cutsLog;
      weekHistory = remoteData.weekHistory;
      render();
    }
  }catch(e){ /* ignore transient errors */ }
  syncing = false;
}

// ---------- One-time storage setup ----------
function renderSetup(){
  app.innerHTML = `
    <div class="eyebrow">Barbería Elite</div>
    <h1>Registro de cortes</h1>
    <div class="subtitle">Primera vez que se abre este archivo — hay que crear el almacenamiento compartido, una sola vez.</div>
    <div class="card">
      <button class="btn" id="createBinBtn">Crear almacenamiento</button>
      <div id="setupMsg" class="cut-meta" style="margin-top:10px;"></div>
    </div>
  `;
  document.getElementById('createBinBtn').addEventListener('click', async ()=>{
    const msg = document.getElementById('setupMsg');
    msg.textContent = 'Creando…';
    try{
      const id = await createBin();
      JSONBIN_BIN_ID = id;
      remoteData = defaultRemoteData();
      config = remoteData.config;
      cutsLog = remoteData.cutsLog;
      weekHistory = remoteData.weekHistory;
      app.innerHTML = `
        <div class="eyebrow">Barbería Elite</div>
        <h1>¡Listo!</h1>
        <div class="card">
          <div class="cut-meta" style="font-size:13px; line-height:1.5; margin-bottom:10px;">
            Se creó el almacenamiento. Mandale este código a Kevin (por chat) para que quede guardado para siempre en el archivo:
          </div>
          <input readonly value="${id}" style="text-align:center; font-weight:800;" onclick="this.select()" />
          <button class="btn" id="continueBtn" style="margin-top:14px;">Usar la app ahora</button>
        </div>
      `;
      document.getElementById('continueBtn').addEventListener('click', ()=> render());
    }catch(e){
      msg.textContent = 'Hubo un error creando el almacenamiento. Revisá la conexión y probá de nuevo.';
    }
  });
}

// ---------- Init ----------
(async function init(){
  if(!JSONBIN_BIN_ID){
    renderSetup();
    return;
  }
  app.innerHTML = '<div class="empty" style="padding-top:40px;">Cargando…</div>';
  try{
    remoteData = await fetchRemote();
  }catch(e){
    remoteData = defaultRemoteData();
  }
  config = remoteData.config;
  cutsLog = remoteData.cutsLog;
  weekHistory = remoteData.weekHistory;
  render();
  setInterval(syncFromRemote, 4000);
})();
</script>
